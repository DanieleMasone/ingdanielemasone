version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-patch:
        update-types:
          - "patch"
        patterns:
          - "*"
      npm-minor:
        update-types:
          - "minor"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      actions-patch-minor:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
