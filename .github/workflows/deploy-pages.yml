name: Portfolio CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Ensure npm version
        run: |
          npm install --global npm@11.17.0
          node --version
          npm --version
          expected_node="v$(cat .nvmrc)"
          expected_npm="$(node -p 'require("./package.json").engines.npm')"
          test "$(node --version)" = "$expected_node"
          test "$(npm --version)" = "$expected_npm"

      - name: Validate dependency lock
        run: npm run deps:validate

      - name: Install frozen dependencies
        run: npm ci --include=optional

      - name: Run tests with coverage
        run: npm run coverage

      - name: Generate source documentation
        run: npm run doc

      - name: Build production application
        run: npm run build

      - name: Install Playwright Chromium headless shell
        run: npx playwright install --with-deps --only-shell chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e:run

      - name: Prepare published reports
        run: npm run prepare:reports

      - name: Validate Pages artifact
        run: npm run artifact:validate

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
